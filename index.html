<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winkelwerk Menü</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="left">

        <h2 class="logo">WINKELWERK</h2>
        <h1>MENÜ</h1>

        <div class="menu-item">
            <img src="burger.png" class="icon">
            <div>
                <h3>SMASHBURGER</h3>
                <p>
                Frisch gesmashtes Rindfleisch-Patty vom Holzkohlegrill im
                Sesam-Bun, mit Salat, Tomaten und geschmolzenem Käse.
                </p>
            </div>
        </div>

        <div class="menu-item">
            <img src="chicken.png" class="icon">
            <div>
                <h3>TANDOORI CHICKEN</h3>
                <p>
                Chicken mariniert in Yoghurt und Gewürzen,
                gegrillt in einem Tandoor für deliziösen Geschmack.
                </p>
            </div>
        </div>

    </div>

    <div class="right">
        <img src="food1.jpg">
        <img src="food2.jpg">
        <img src="food3.jpg">
    </div>

</div>

</body>
</html>
